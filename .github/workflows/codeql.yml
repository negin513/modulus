# CodeQL security scanning (advanced setup, mirroring NVIDIA/warp's workflow).
# Results appear under the repo's Security > Code scanning tab once an admin
# enables Code Scanning with "advanced setup" (NOT "default setup", which
# conflicts with a committed codeql.yml).
#
# Runs on pushes to main and a weekly schedule. No `pull_request` trigger for
# now: this repo's PR CI runs through blossom's `pull-request/N` mirror
# branches, so per-PR scanning is left as a follow-up once the base scanning
# is established.

name: "CodeQL"

on:
  push:
    branches:
      - main
  schedule:
    - cron: "45 9 * * 1"

jobs:
  analyze:
    # Guard the scheduled run so forks don't burn CI minutes on it.
    if: github.event_name != 'schedule' || github.repository == 'NVIDIA/physicsnemo'
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      security-events: write
      packages: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Initialize CodeQL
      uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
      with:
        languages: ${{ matrix.language }}
        queries: security-extended
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
      with:
        category: "/language:${{matrix.language}}"
