# Dataset root directories.
#
# Each entry resolves from an environment variable so the same recipe
# checkout can drive multiple cluster layouts (Lustre, NVMe stage-in,
# laptop) without mutating this file.  If the env var is unset the value
# stays MISSING (`???`) and OmegaConf raises MissingMandatoryValue at
# runtime, which fails fast with a clear message.
#
# Set the corresponding env var before launching `src/train.py`, e.g.:
#   export DATASET_PATH_DRIVAER_ML=/lustre/fs1/.../PhysicsNeMo-DrivaerML
#
# `benchmarks/run_benchmark.sbatch` exports these automatically based on
# the matrix entry's STORAGE_MODE (Lustre path or NVMe stage-in dir).

drivaer_ml:       ${oc.env:DATASET_PATH_DRIVAER_ML, ???}
highlift_aero_ml: ${oc.env:DATASET_PATH_HIGHLIFT_AERO_ML, ???}
shift_suv:        ${oc.env:DATASET_PATH_SHIFT_SUV, ???}
# DriveSim is awaiting Muhammad's confirmation on path / format / field names.
# See datasets/drivesim_volume.yaml for the stub pipeline that consumes this.
drivesim:         ${oc.env:DATASET_PATH_DRIVESIM, ???}
