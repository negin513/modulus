# DriveSim volume dataset (DomainMesh) -- STUB AWAITING MUHAMMAD
# ---------------------------------------------------------------
# This file is a placeholder shape that mirrors drivaer_ml_volume.yaml so
# the unified recipe can compose a CLI invocation `model=geotransolver_volume
# dataset=drivesim_volume` end-to-end as soon as `dataset_paths.drivesim` is
# pointed at a real directory.  Until then, OmegaConf will raise
# `MissingMandatoryValue` on the `???` placeholder in dataset_paths.yaml so
# the run fails fast with a clear error.
#
# Confirm with Muhammad before flipping this on:
#   * Path on Lustre (group HSG mount)
#   * File format -- is it the curated `.pdmsh` DomainMesh layout, or raw
#     VTK / .vtu / OpenFOAM that needs PhysicsNeMo-Curator preprocessing?
#   * Field names (the rename + nondim blocks below currently assume the
#     DrivAerML naming convention -- UMeanTrim / pMeanTrim / nutMeanTrim)
#   * Whether a sibling `*_single_solid.stl.pmsh` boundary exists for SDF
#     computation
#   * Recommended subsampling resolution given the source mesh size
#   * Whether DriveSim has a manifest.json next to the data dir, or uses
#     directory-mode train/val splits

train_datadir: ${dataset_paths.drivesim}

pipeline:
  reader:
    _target_: ${dp:DomainMeshReader}
    path: ${train_datadir}
    pattern: "**/domain_*.pdmsh"   # TODO confirm with Muhammad
    subsample_n_points: ${sampling_resolution}
    subsample_n_cells: ${sampling_resolution}
    extra_boundaries:
      stl_geometry:
        pattern: "*_single_solid.stl.pmsh"   # TODO confirm with Muhammad
  augmentations:
    - _target_: ${dp:RandomRotateMesh}
      axes: ["z"]
      transform_point_data: true
      transform_global_data: true
    - _target_: ${dp:RandomTranslateMesh}
      distribution:
        _target_: torch.distributions.Uniform
        low: [-1.0, -1.0, 0.0]
        high: [1.0, 1.0, 0.0]
  transforms:
    - _target_: ${dp:DropMeshFields}
      global_data: [TimeValue]
    - _target_: ${dp:CenterMesh}
      use_area_weighting: false
    # NOTE: Field name mappings mirror DrivAerML.  Muhammad to confirm
    # whether DriveSim uses the same trim-mean naming convention or
    # something else (e.g. ensemble means, direct U/p fields).
    - _target_: ${dp:NonDimensionalizeByMetadata}
      fields:
        UMeanTrim: velocity
        pMeanTrim: pressure
        nutMeanTrim: identity
      association: point_data
    - _target_: ${dp:ComputeSDFFromBoundary}
      boundary_name: stl_geometry
      sdf_field: sdf
      normals_field: sdf_normals
      use_winding_number: true
    - _target_: ${dp:DropBoundary}
      names: [stl_geometry]
    - _target_: ${dp:RenameMeshFields}
      point_data:
        UMeanTrim: velocity
        pMeanTrim: pressure
        nutMeanTrim: nut
    - _target_: ${dp:NormalizeMeshFields}
      association: point_data
      fields:
        nut: {type: scalar, mean: 4.8e-4, std: 9.4e-4}

# Same target shape as DrivAerML volume so the GeoTransolver volume model
# template's out_dim auto-derivation works without per-dataset patching.
targets:
  velocity: vector
  pressure: scalar
  nut: scalar
